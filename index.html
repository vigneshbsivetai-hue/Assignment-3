<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Creative Event Registration</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#4facfe,#00f2fe);
    margin:0;
    padding:0;
}

.container{
    width:80%;
    margin:auto;
    background:white;
    margin-top:30px;
    padding:25px;
    border-radius:12px;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    color:#333;
}

label{
    font-weight:bold;
}

input, select{
    width:100%;
    padding:8px;
    margin:6px 0 12px 0;
    border-radius:6px;
    border:1px solid #ccc;
}

input:focus, select:focus{
    outline:none;
    border:1px solid #4facfe;
}

button{
    width:100%;
    padding:10px;
    border:none;
    background:#4facfe;
    color:white;
    font-size:16px;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#00c6ff;
}

table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}

table, th, td{
    border:1px solid #ddd;
}

th{
    background:#4facfe;
    color:white;
    padding:10px;
}

td{
    padding:8px;
    text-align:center;
}

.success{
    background:#d4edda;
    color:#155724;
    padding:10px;
    margin-top:10px;
    display:none;
    border-radius:6px;
}

.valid{
    border:2px solid green;
}

.invalid{
    border:2px solid red;
}
</style>
</head>

<body>

<div class="container">

<h1>Event Registration</h1>

<form id="regForm">

<label>Name</label>
<input type="text" id="name">

<label>Email</label>
<input type="text" id="email">

<label>Phone</label>
<input type="text" id="phone">

<label>College/Company</label>
<input type="text" id="college">

<label>Event</label>
<select id="event">
<option value="">Select Event</option>
<option>Web Development</option>
<option>AI Workshop</option>
<option>Hackathon</option>
</select>

<label>Mode</label>
<select id="mode">
<option value="">Select Mode</option>
<option>Online</option>
<option>Offline</option>
</select>

<label>
<input type="checkbox" id="confirm">
I confirm that the above details are correct
</label>

<button type="submit">Register</button>

</form>

<div class="success" id="successMsg">
Registration Successful!
</div>

<table>
<tr>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Event</th>
<th>Mode</th>
</tr>
<tbody id="tableBody"></tbody>
</table>

</div>

<script>

let form = document.getElementById("regForm");

form.addEventListener("submit", function(e){

e.preventDefault();

let name = document.getElementById("name");
let email = document.getElementById("email");
let phone = document.getElementById("phone");
let college = document.getElementById("college");
let event = document.getElementById("event");
let mode = document.getElementById("mode");
let confirmBox = document.getElementById("confirm");

let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
let phonePattern = /^[0-9]{10}$/;

let valid = true;

validateField(name, name.value.trim() !== "");
validateField(email, emailPattern.test(email.value));
validateField(phone, phonePattern.test(phone.value));
validateField(college, college.value.trim() !== "");
validateField(event, event.value !== "");
validateField(mode, mode.value !== "");

if(!confirmBox.checked){
alert("Please confirm details");
valid = false;
}

function validateField(field, condition){
if(condition){
field.classList.add("valid");
field.classList.remove("invalid");
}else{
field.classList.add("invalid");
field.classList.remove("valid");
valid = false;
}
}

if(valid){

let table = document.getElementById("tableBody");

let row = document.createElement("tr");

row.innerHTML = `
<td>${name.value}</td>
<td>${email.value}</td>
<td>${phone.value}</td>
<td>${event.value}</td>
<td>${mode.value}</td>
`;

table.appendChild(row);

document.getElementById("successMsg").style.display="block";

setTimeout(()=>{
document.getElementById("successMsg").style.display="none";
},3000);

form.reset();

let inputs = document.querySelectorAll("input, select");
inputs.forEach(i=>{
i.classList.remove("valid");
i.classList.remove("invalid");
});

}

});
</script>

</body>
</html>
